name: GEO daemon
on:
  schedule:
    - cron: '0 12 * * 0'      # Sundays 12:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run daemon
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          SERPAPI_API_KEY:    ${{ secrets.SERPAPI_API_KEY }}
      - name: Commit data
        run: |
          git config user.name  "geo-daemon"
          git config user.email "daemon@evanqhuang.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d)"
          git push
      - name: Trigger portfolio rebuild
        run: |
          curl -fsS -X POST \
            -H "Authorization: token ${{ secrets.PORTFOLIO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/evanqhuang/portfolio/dispatches \
            -d '{"event_type":"geo-data-updated"}'
